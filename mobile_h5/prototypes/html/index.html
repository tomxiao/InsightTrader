<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend_mobile HTML 原型</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="prototype-stage">
      <header class="prototype-header">
        <div>
          <h1>frontend_mobile 高保真 HTML 原型</h1>
          <p>
            基于移动端一期 PRD、低保真结构和 DeepSeek 风格参考输出的静态原型目录页。
            所有页面均为本地静态 HTML，不依赖接口。

        </div>
        <nav class="prototype-links">
          <a class="prototype-link" href="./login.html" data-nav>登录页</a>
          <a class="prototype-link" href="./conversation-empty.html" data-nav>会话空态</a>
          <a class="prototype-link" href="./conversation-running.html" data-nav>会话运行态</a>
          <a class="prototype-link" href="./conversation-result.html" data-nav>会话结果态</a>

          <a class="prototype-link" href="./report-reader.html" data-nav>完整报告</a>
        </nav>
      </header>

      <section class="prototype-grid">
        <article class="menu-card">
          <h3>交付页面</h3>
          <div class="summary-actions">
            <a class="btn primary" href="./login.html">打开登录页</a>
            <a class="btn secondary" href="./conversation-empty.html">打开会话空态</a>
          </div>
          <div class="summary-actions">
            <a class="btn secondary" href="./conversation-running.html">打开会话运行态</a>
            <a class="btn secondary" href="./conversation-result.html">打开会话结果态</a>

          <div class="summary-actions">
            <a class="btn secondary" href="./drawer.html">打开左侧抽屉</a>
            <a class="btn secondary" href="./report-reader.html">打开完整报告阅读页</a>
          </div>
        </article>

        <article class="menu-card">
          <h3>原型特征</h3>
          <p class="hero-description" style="text-align: left; margin: 14px 0 0; max-width: none">
            深色极简风格、统一会话工作台、结果卡片化、抽屉承载历史与账户入口、完整报告进入独立阅读层。
          </p>
          <div class="summary-actions">
            <span class="card-tag">DeepSeek 风格参考</span>
            <span class="card-tag">移动 H5 视口</span>
            <span class="card-tag">静态多页面</span>
