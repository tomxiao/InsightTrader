<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录页原型</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="prototype-stage">
      <header class="prototype-header">
        <div>
          <h1>登录页高保真原型</h1>
          <p>聚焦“快速进入系统”，延续深色极简气质，但不与主会话工作台争抢信息层级。</p>
        </div>
        <nav class="prototype-links">
          <a class="prototype-link" href="./index.html" data-nav>目录</a>
          <a class="prototype-link" href="./login.html" data-nav>登录页</a>
          <a class="prototype-link" href="./conversation-empty.html" data-nav>会话空态</a>
          <a class="prototype-link" href="./conversation-running.html" data-nav>会话运行态</a>
          <a class="prototype-link" href="./conversation-result.html" data-nav>会话结果态</a>
          <a class="prototype-link" href="./drawer.html" data-nav>左侧抽屉</a>
          <a class="prototype-link" href="./report-reader.html" data-nav>完整报告</a>
        </nav>
      </header>

      <div class="phone-frame">
        <div class="phone-notch"></div>
        <section class="screen">
          <div class="statusbar">
            <span><strong>9:41</strong></span>
            <span>5G · 86%</span>
          </div>

          <div class="prototype-page-nav">
            <a class="page-menu" href="./index.html">返回目录</a>
          </div>

          <div class="login-layout">
            <div class="login-brand">
              <div class="brand-chip">
                <span class="brand-dot"></span>
                InsightTrader
              </div>
              <h2>轻量投研对话工作台</h2>
              <p>登录后直接进入当前会话，在一个线程里完成个股分析发起、结果阅读与继续追问。</p>
            </div>

            <section class="login-panel">
              <div class="field">
                <label>用户名 / 邮箱 / 手机号</label>
                <div class="field-input">admin_testor</div>
              </div>
              <div class="field">
                <label>密码</label>
                <div class="field-input">••••••••••••</div>
              </div>
              <div class="login-actions">
                <a class="btn primary" href="./conversation-empty.html">登录并进入当前会话</a>
              </div>
              <p class="field-note">示例错误提示占位：用户名或密码错误，请重新输入。</p>
            </section>
          </div>
        </section>
      </div>
    </main>

    <script src="./assets/app.js"></script>
  </body>
</html>
