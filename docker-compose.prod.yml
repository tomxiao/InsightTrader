services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: m.daocloud.io/docker.io/library/mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    # 仅内网访问，不对外暴露端口

  # ── Redis（任务队列）──────────────────────────────────────────────────────────
  redis:
    image: m.daocloud.io/docker.io/library/redis:7-alpine
    restart: unless-stopped
    networks:
      - backend
    # 仅内网访问，不对外暴露端口

  # ── ta_service（FastAPI 后端）────────────────────────────────────────────────
  ta_service:
    build:
      context: .
      dockerfile: Dockerfile.ta_service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8100:8100"   # 只绑定本机，由 Nginx 反代
    volumes:
      - reports:/home/appuser/app/reports
      - results:/home/appuser/app/results
      - logs:/home/appuser/app/logs
      - data_cache:/home/appuser/app/dataflows/data_cache
    depends_on:
      - mongo
      - redis
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  mongo_data:
  reports:
  results:
  logs:
  data_cache:

networks:
  backend:
    driver: bridge
