# InsightTrader Nginx 配置（HTTPS 版）
# 部署路径：/etc/nginx/sites-available/insighttrader
# 证书路径：/etc/nginx/ssl/93901.pro.pem  /etc/nginx/ssl/93901.pro.key

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name 93901.pro www.93901.pro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 93901.pro www.93901.pro;

    ssl_certificate     /etc/nginx/ssl/93901.pro.pem;
    ssl_certificate_key /etc/nginx/ssl/93901.pro.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 前端静态文件目录（npm run build 产物）
    root /opt/insighttrader/mobile_h5/dist;
    index index.html;

    # ── 后端 API（/api/ 路径反代到 ta_service）───────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 分析任务耗时较长，超时设置宽松
        proxy_read_timeout 600s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # ── 前端（Vue Router history 模式：所有其他路径回退到 index.html）────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
}
